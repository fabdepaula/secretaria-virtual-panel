services:
  secretaria-animallabor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    networks:
      - proxy-net
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      N8N_EMBEDDING_WEBHOOK_URL: ${N8N_EMBEDDING_WEBHOOK_URL:-}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-net
      - "traefik.http.routers.secretaria-animallabor.rule=Host(`${PANEL_HOST}`)"
      - traefik.http.routers.secretaria-animallabor.entrypoints=websecure
      - traefik.http.routers.secretaria-animallabor.tls=true
      # Nome = chave em certificatesResolvers do Traefik (teu log: providerName=le.acme → use "le")
      - traefik.http.routers.secretaria-animallabor.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.routers.secretaria-animallabor.service=secretaria-animallabor
      - traefik.http.services.secretaria-animallabor.loadbalancer.server.port=3000

networks:
  proxy-net:
    external: true
