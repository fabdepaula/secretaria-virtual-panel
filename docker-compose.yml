services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    networks:
      - proxy-net
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      N8N_EMBEDDING_WEBHOOK_URL: ${N8N_EMBEDDING_WEBHOOK_URL:-}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-net
      - "traefik.http.routers.panel.rule=Host(`${PANEL_HOST}`)"
      - traefik.http.routers.panel.entrypoints=websecure
      - traefik.http.routers.panel.tls=true
      - traefik.http.routers.panel.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.panel.service=panel
      - traefik.http.services.panel.loadbalancer.server.port=3000

networks:
  proxy-net:
    external: true
